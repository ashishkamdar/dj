<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>

  <!-- कachaa -->
  <text x="256" y="230" text-anchor="middle" fill="white" font-family="'Noto Sans Devanagari', sans-serif" font-weight="700">
    <tspan font-size="150">क</tspan><tspan font-size="100" font-family="'Inter', sans-serif" dy="-8">acha</tspan>
  </text>

  <!-- पakka -->
  <text x="256" y="410" text-anchor="middle" fill="white" font-family="'Noto Sans Devanagari', sans-serif" font-weight="700">
    <tspan font-size="150">प</tspan><tspan font-size="100" font-family="'Inter', sans-serif" dy="-8">aka</tspan>
  </text>
</svg>
