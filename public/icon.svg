<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>

  <!-- क प stacked -->
  <text x="256" y="230" text-anchor="middle" fill="white" font-family="'Noto Sans Devanagari', sans-serif" font-size="180" font-weight="700">क</text>
  <text x="256" y="420" text-anchor="middle" fill="white" font-family="'Noto Sans Devanagari', sans-serif" font-size="180" font-weight="700">प</text>
</svg>
